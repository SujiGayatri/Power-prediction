<!DOCTYPE html>
<html lang="en">
<head>
<title>Power System Login</title>
<meta charset="UTF-8">

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
body{
font-family:'Space Grotesk',sans-serif;
}

/* glass card */
.glass{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.25);
}

/* gradient text */
.grad-text{
background:linear-gradient(90deg,#6366f1,#22d3ee,#ec4899);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* input style */
.input-neo{
background:rgba(0,0,0,0.45);
border:1px solid rgba(255,255,255,0.25);
color:white;
transition:all .3s ease;
}

.input-neo:focus{
outline:none;
border-color:#6366f1;
box-shadow:0 0 0 3px rgba(99,102,241,.4);
}

/* button */
.btn-neo{
background:linear-gradient(135deg,#6366f1,#22d3ee);
padding:14px 40px;
border-radius:999px;
font-weight:700;
color:white;
transition:all .3s ease;
}

.btn-neo:hover{
transform:translateY(-3px);
box-shadow:0 0 25px rgba(99,102,241,.5);
}
</style>

</head>

<body class="bg-gradient-to-br from-[#0f172a] via-[#020617] to-[#0f172a] min-h-screen flex items-center justify-center">

<div class="glass p-14 rounded-[2rem] w-[480px] text-center">

<h1 class="text-4xl font-bold grad-text mb-6">
⚡ Power Estimation
</h1>

<p class="text-gray-400 mb-10">
Sign in to access the forecasting dashboard
</p>

<div class="space-y-6">

<!-- <input
type="text"
placeholder="Username"
class="input-neo w-full p-4 rounded-xl"
/>

<input
type="password"
placeholder="Password"
class="input-neo w-full p-4 rounded-xl"
/>

<button class="btn-neo w-full">
Sign In
</button> -->

<form method="POST" action="/login" class="space-y-6">

<input
type="text"
name="username"
placeholder="Username"
class="input-neo w-full p-4 rounded-xl"
/>

<input
type="password"
name="password"
placeholder="Password"
class="input-neo w-full p-4 rounded-xl"
/>

<button type="submit" class="btn-neo w-full">
Sign In
</button>

</form>

</div>

<p class="text-gray-500 text-sm mt-8">
Smart Grid Intelligence Platform
</p>

</div>

</body>
</html>
